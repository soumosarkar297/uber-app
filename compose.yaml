name: uber-app

services:
  # ─────────────────────────────────────────
  # REDIS — OTP Storage + Token Blacklist + Driver Locations
  # ─────────────────────────────────────────
  redis:
    image: redis:latest
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - rideshare-network

  # ─────────────────────────────────────────
  # MYSQL — Persistent Data Store
  # ─────────────────────────────────────────
  mysql:
    image: mysql:8.4
    container_name: mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: "${MYSQL_DATABASE}"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - rideshare-network

  # ─────────────────────────────────────────
  # ZOOKEEPER — Required by Kafka
  # ─────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - rideshare-network

  # ─────────────────────────────────────────
  # KAFKA — Event Streaming
  # ─────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: "${KAFKA_ADVERTISED_LISTENERS}"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "${KAFKA_LISTENER_SECURITY_PROTOCOL_MAP}"
      KAFKA_INTER_BROKER_LISTENER_NAME: "${KAFKA_INTER_BROKER_LISTENER_NAME}"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - rideshare-network

  # ─────────────────────────────────────────
  # AUTH SERVICE — OTP + JWT + Device Management
  # ─────────────────────────────────────────
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ISSUER: "http://auth-service:8081"
      SERVER_PORT: 8081
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/api/v1/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - rideshare-network

  # ─────────────────────────────────────────
  # USER SERVICE — Riders & Drivers
  # ─────────────────────────────────────────
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    ports:
      - "8082:8082"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWKS_URI: "http://auth-service:8081/api/v1/api/auth/token/jwks"
      SERVER_PORT: 8082
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8082/api/v1/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
    networks:
      - rideshare-network

  # ─────────────────────────────────────────
  # LOCATION SERVICE — Driver Location Tracking
  # ─────────────────────────────────────────
  location-service:
    build:
      context: ./location-service
      dockerfile: Dockerfile
    container_name: location-service
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVER_PORT: 8083
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/api/v1/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - rideshare-network

  # ─────────────────────────────────────────
  # RIDE SERVICE — Ride Lifecycle
  # ─────────────────────────────────────────
  ride-service:
    build:
      context: ./ride-service
      dockerfile: Dockerfile
    container_name: ride-service
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8084:8084"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SERVER_PORT: 8084
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8084/api/v1/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
    networks:
      - rideshare-network

  # ─────────────────────────────────────────
  # MATCHING SERVICE — Driver Matching
  # ─────────────────────────────────────────
  matching-service:
    build:
      context: ./matching-service
      dockerfile: Dockerfile
    container_name: matching-service
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      location-service:
        condition: service_healthy
    ports:
      - "8085:8085"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LOCATION_SERVICE_URL: "http://location-service:8083/api/v1"
      SERVER_PORT: 8085
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8085/api/v1/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - rideshare-network

  # ─────────────────────────────────────────
  # DRIVER SERVICE — Driver Management, Documents & Availability
  # ─────────────────────────────────────────
  driver-service:
    build:
      context: ./driver-service
      dockerfile: Dockerfile
    container_name: driver-service
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    ports:
      - "8086:8086"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWKS_URI: "http://auth-service:8081/api/v1/api/auth/token/jwks"
      SERVER_PORT: 8086
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8086/api/v1/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
    networks:
      - rideshare-network

  # ─────────────────────────────────────────
  # PRICING SERVICE — Dynamic Pricing, Surge, Promo Codes
  # ─────────────────────────────────────────
  pricing-service:
    build:
      context: ./pricing-service
      dockerfile: Dockerfile
    container_name: pricing-service
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8087:8087"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVER_PORT: 8087
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8087/api/v1/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
    networks:
      - rideshare-network

  # ─────────────────────────────────────────
  # PAYMENT SERVICE — Wallet, Payments & Transactions
  # ─────────────────────────────────────────
  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8088:8088"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SERVER_PORT: 8088
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8088/api/v1/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
    networks:
      - rideshare-network

  # ─────────────────────────────────────────
  # NOTIFICATION SERVICE — Push, Email & Real-time
  # ─────────────────────────────────────────
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8089:8089"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SERVER_PORT: 8089
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8089/api/v1/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
    networks:
      - rideshare-network

  # ─────────────────────────────────────────
  # RATING SERVICE — Reviews & Ratings
  # ─────────────────────────────────────────
  rating-service:
    build:
      context: ./rating-service
      dockerfile: Dockerfile
    container_name: rating-service
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8090:8090"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SERVER_PORT: 8090
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8090/api/v1/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
    networks:
      - rideshare-network

  # ─────────────────────────────────────────
  # TRIP SERVICE — Trip History & Analytics
  # ─────────────────────────────────────────
  trip-service:
    build:
      context: ./trip-service
      dockerfile: Dockerfile
    container_name: trip-service
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8091:8091"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SERVER_PORT: 8091
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8091/api/v1/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
    networks:
      - rideshare-network

  # ─────────────────────────────────────────
  # DRIVER ONBOARDING SERVICE — Verification & Approval
  # ─────────────────────────────────────────
  driver-onboarding-service:
    build:
      context: ./driver-onboarding-service
      dockerfile: Dockerfile
    container_name: driver-onboarding-service
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8092:8092"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SERVER_PORT: 8092
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8092/api/v1/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
    networks:
      - rideshare-network

  # ─────────────────────────────────────────
  # API GATEWAY — Single Entry Point + Swagger Aggregation
  # ─────────────────────────────────────────
  gateway-service:
    build:
      context: ./gateway-service
      dockerfile: Dockerfile
    container_name: gateway-service
    restart: unless-stopped
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      location-service:
        condition: service_healthy
      ride-service:
        condition: service_healthy
      driver-service:
        condition: service_healthy
      pricing-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      rating-service:
        condition: service_healthy
      trip-service:
        condition: service_healthy
      driver-onboarding-service:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - rideshare-network

networks:
  rideshare-network:
    name: rideshare-network
    driver: bridge

volumes:
  mysql_data:
