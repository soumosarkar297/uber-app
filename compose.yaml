name: uber-app

services:
  # ─────────────────────────────────────────
  # REDIS — OTP Storage + Token Blacklist + Driver Locations
  # ─────────────────────────────────────────
  redis:
    image: redis:latest
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - rideshare-network

  # ─────────────────────────────────────────
  # MYSQL — Persistent Data Store
  # ─────────────────────────────────────────
  mysql:
    image: mysql:8.4
    container_name: mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: "${MYSQL_DATABASE}"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - rideshare-network

  # ─────────────────────────────────────────
  # ZOOKEEPER — Required by Kafka
  # ─────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - rideshare-network

  # ─────────────────────────────────────────
  # KAFKA — Event Streaming
  # ─────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: "${KAFKA_ADVERTISED_LISTENERS}"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "${KAFKA_LISTENER_SECURITY_PROTOCOL_MAP}"
      KAFKA_INTER_BROKER_LISTENER_NAME: "${KAFKA_INTER_BROKER_LISTENER_NAME}"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - rideshare-network

  # ─────────────────────────────────────────
  # AUTH SERVICE — OTP + JWT + Device Management
  # ─────────────────────────────────────────
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ISSUER: "http://auth-service:9000"
      SERVER_PORT: 9000
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - rideshare-network

  # ─────────────────────────────────────────
  # USER SERVICE — Riders & Drivers
  # ─────────────────────────────────────────
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWKS_URI: "http://auth-service:9000/api/auth/token/jwks"
      SERVER_PORT: 8081
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
    networks:
      - rideshare-network

  # ─────────────────────────────────────────
  # LOCATION SERVICE — Driver Location Tracking
  # ─────────────────────────────────────────
  location-service:
    build:
      context: ./location-service
      dockerfile: Dockerfile
    container_name: location-service
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8082:8082"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVER_PORT: 8082
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8082/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - rideshare-network

  # ─────────────────────────────────────────
  # RIDE SERVICE — Ride Lifecycle
  # ─────────────────────────────────────────
  ride-service:
    build:
      context: ./ride-service
      dockerfile: Dockerfile
    container_name: ride-service
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SERVER_PORT: 8083
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
    networks:
      - rideshare-network

  # ─────────────────────────────────────────
  # MATCHING SERVICE — Driver Matching
  # ─────────────────────────────────────────
  matching-service:
    build:
      context: ./matching-service
      dockerfile: Dockerfile
    container_name: matching-service
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      location-service:
        condition: service_healthy
    ports:
      - "8084:8084"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LOCATION_SERVICE_URL: "http://location-service:8082/api/v1"
      SERVER_PORT: 8084
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8084/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - rideshare-network

networks:
  rideshare-network:
    name: rideshare-network
    driver: bridge

volumes:
  mysql_data:
