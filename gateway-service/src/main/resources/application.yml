server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: auth-service
        url: /auth/api-docs
      - name: user-service
        url: /user/api-docs
      - name: location-service
        url: /location/api-docs
      - name: ride-service
        url: /ride/api-docs
      - name: driver-service
        url: /driver/api-docs
      - name: pricing-service
        url: /pricing/api-docs
      - name: payment-service
        url: /payment/api-docs
      - name: notification-service
        url: /notification/api-docs
      - name: rating-service
        url: /rating/api-docs
      - name: trip-service
        url: /trip/api-docs
      - name: driver-onboarding-service
        url: /onboarding/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: INFO
